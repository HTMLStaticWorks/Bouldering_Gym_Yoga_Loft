<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Path Not Found | Bouldering Gym & Yoga Loft</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(26, 77, 46, 0.8), rgba(26, 77, 46, 0.8)), url('https://images.unsplash.com/photo-1516592673884-4a382d1124c2?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
            color: white;
        }
        .error-code {
            font-size: 10rem;
            line-height: 1;
            font-family: var(--heading-font);
            margin-bottom: 0;
            color: var(--secondary-color);
        }
    </style>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'>
</head>
<body>

    <div class="error-page">
        <div class="container">
            <h1 class="error-code">404</h1>
            <h2 class="display-4 mb-4 text-uppercase">Looks like you've fallen off the wall</h2>
            <p class="lead mb-5 opacity-75">The page you're looking for doesn't exist or has been moved to a new route.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="index.html" class="btn btn-primary btn-lg px-5">BACK TO BASE CAMP</a>
                <a href="contact.html" class="btn btn-outline-light btn-lg px-5">REPORT ISSUE</a>
            </div>
        </div>
    </div>

    <!-- Theme / RTL Toggles -->
    <div class="auth-toggles d-flex gap-2">
        <button id="theme-toggle" class="btn btn-white shadow-sm rounded-circle p-2" title="Toggle Theme">
            <i data-lucide="moon" class="size-20"></i>
        </button>
        <button id="rtl-toggle" class="btn btn-white shadow-sm rounded-circle p-2" title="Toggle RTL">
            <i data-lucide="arrow-left-right" class="size-20"></i>
        </button>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
