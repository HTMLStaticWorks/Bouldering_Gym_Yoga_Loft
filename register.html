<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Bouldering Gym & Yoga Loft</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    
    <!-- Font Awesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: var(--gray-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
    </style>
</head>
<body class="auth-page">

    <!-- Top Right Toggles -->
    <div class="auth-toggles d-flex gap-2">
        <button id="theme-toggle" class="btn btn-white shadow-sm rounded-circle p-2" title="Toggle Theme">
            <i data-lucide="moon" class="size-20"></i>
        </button>
        <button id="rtl-toggle" class="btn btn-white shadow-sm rounded-circle p-2" title="Toggle RTL">
            <i data-lucide="arrow-left-right" class="size-20"></i>
        </button>
    </div>

    <!-- Auth Card -->
    <div class="card auth-card animate-on-scroll mx-auto">
        <div class="card-body p-4 p-md-5 text-center">
            <div class="mb-5">
                <a href="index.html" class="text-decoration-none">
                    <div class="d-flex align-items-center justify-content-center mb-2">
                        <i data-lucide="mountain" class="auth-brand-name size-32 me-2"></i>
                        <h3 class="fw-bold auth-brand-name mb-0 tracking-widest" style="font-size: 1.5rem;">BOULDER & YOGA</h3>
                    </div>
                </a>
            </div>
            
            <h2 class="h4 mb-4 tracking-widest">CREATE ACCOUNT</h2>
            
            <!-- Register Form -->
            <form>
                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold tracking-widest">FULL NAME</label>
                    <input type="text" class="form-control py-3" placeholder="FULL NAME">
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold tracking-widest">EMAIL ADDRESS</label>
                    <input type="email" class="form-control py-3" placeholder="EMAIL ADDRESS">
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold tracking-widest">PASSWORD</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="password-input" class="form-control py-3" placeholder="PASSWORD">
                        <div class="password-toggle" onclick="togglePasswordVisibility('password-input', this)">
                            <i data-lucide="eye" class="size-20"></i>
                        </div>
                    </div>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label small fw-bold tracking-widest">CONFIRM PASSWORD</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="confirm-password-input" class="form-control py-3" placeholder="CONFIRM PASSWORD">
                        <div class="password-toggle" onclick="togglePasswordVisibility('confirm-password-input', this)">
                            <i data-lucide="eye" class="size-20"></i>
                        </div>
                    </div>
                </div>
                
                <div class="form-check text-start mb-4">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label small" for="terms">
                        I agree to the <a href="#" class="text-primary-custom">Terms of Service</a>
                    </label>
                </div>

                <button class="btn btn-primary w-100 py-3 mb-4">CREATE ACCOUNT</button>
                
                <div class="d-flex align-items-center mb-4">
                    <hr class="flex-grow-1">
                    <span class="px-3 text-muted small tracking-widest">OR CONTINUE WITH</span>
                    <hr class="flex-grow-1">
                </div>

                <!-- Social Logins -->
                <div class="d-flex gap-3 justify-content-center">
                    <a href="#" class="social-btn" title="Google">
                        <i class="fa-brands fa-google"></i>
                    </a>
                    <a href="#" class="social-btn" title="Facebook">
                        <i class="fa-brands fa-facebook-f"></i>
                    </a>
                    <a href="#" class="social-btn" title="Apple">
                        <i class="fa-brands fa-apple"></i>
                    </a>
                </div>
                
                <p class="mt-5 mb-0 text-muted small">Already have an account? <a href="login.html" class="text-secondary-custom fw-bold">Sign In</a></p>
            </form>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
    <script>
        function togglePasswordVisibility(inputId, el) {
            const input = document.getElementById(inputId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            
            const icon = el.querySelector('i');
            if (type === 'text') {
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                icon.setAttribute('data-lucide', 'eye');
            }
            if (window.lucide) lucide.createIcons();
        }
    </script>
</body>
</html>
